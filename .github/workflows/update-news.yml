name: Update news

on:
  schedule:
    # 每天北京时间 08:10 自动抓取并更新新闻数据
    - cron: "10 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Update news data
        run: python scripts/update_news.py

      - name: Commit changes
        run: |
          if git diff --quiet -- data/news.json; then
            echo "No news changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git commit -m "chore: update daily news"
          git push
